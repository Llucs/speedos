# =============================================================================
# SpeedOS - Configurações Principais
# Este arquivo é lido pelo SpeedCenter e pelo Speed-AI-Monitor para otimizações.
# =============================================================================

# --- Otimização de RAM (Valores em MB) ---
# RAM_LIMIT_HIGH: Se o uso de RAM ultrapassar este valor, otimizações agressivas são ativadas.
RAM_LIMIT_HIGH=1500

# RAM_LIMIT_MEDIUM: Otimizações leves são ativadas.
RAM_LIMIT_MEDIUM=1000

# IDLE_RAM: Otimizações de background são ativadas se a RAM livre for menor que este valor.
IDLE_RAM=500

# --- Otimização de CPU (Valores em %) ---
# CPU_LIMIT_HIGH: Se o uso de CPU ultrapassar este valor, o governor é ajustado para performance.
CPU_LIMIT_HIGH=80

# --- Otimização de Disco (Valores em %) ---
# DISK_LIMIT_HIGH: Se o uso de disco ultrapassar este valor, o SpeedClean é sugerido.
DISK_LIMIT_HIGH=90

# --- Configurações do Monitoramento ---
# Intervalo de atualização do monitoramento (em segundos)
UPDATE_INTERVAL=10

# --- Configurações de Tema ---
# Tema padrão (dark/light)
DEFAULT_THEME=dark

# --- Configurações de Segurança e Atualização ---
# Habilitar atualizações automáticas (true/false)
AUTO_UPDATE=true

# Repositório oficial para o SpeedUpdate (Usado para verificar atualizações do sistema e componentes proprietários)
UPDATE_REPO="https://github.com/Llucs/speedos"
