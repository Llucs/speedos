name: Build SpeedOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preparar ambiente e instalar dependências
        run: |
          sudo apt update
          sudo apt install -y software-properties-common ca-certificates gnupg debootstrap
          echo "deb [trusted=yes] http://archive.ubuntu.com/ubuntu noble main universe multiverse restricted" | sudo tee /etc/apt/sources.list.d/noble.list
          sudo apt update
          sudo apt install -y live-build isolinux syslinux syslinux-common

      - name: Mostrar versão do live-build (debug)
        run: lb --version || true

      - name: Configurar build (usando lb config)
        run: |
          cd config/live-build
          sudo lb clean --purge || true
          sudo rm -rf cache/ chroot/ binary/ local/ .build/ || true

          sudo lb config \
            --mode ubuntu \
            --distribution noble \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --bootappend-live "boot=live components username=speedos" \
            --archive-areas "main restricted universe multiverse" \
            --mirror-bootstrap "http://archive.ubuntu.com/ubuntu/" \
            --mirror-chroot "http://archive.ubuntu.com/ubuntu/" \
            --mirror-binary "http://archive.ubuntu.com/ubuntu/" \
            --mirror-debian-installer "http://archive.ubuntu.com/ubuntu/" \
            --apt-indices false \
            --memtest none \
            --bootloader syslinux \
            --syslinux-theme "" \
            --iso-volume "SpeedOS $(date +%Y%m%d)" \
            --iso-application "SpeedOS Live"

          echo "Configuração concluída!"

      - name: Construir ISO SpeedOS
        run: |
          cd config/live-build
          sudo lb build --debug

      - name: Fazer upload da ISO gerada
        uses: actions/upload-artifact@v4
        with:
          name: speedos-iso
          path: '**/*.iso'