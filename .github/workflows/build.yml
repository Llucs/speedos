name: Build SpeedOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update -y
          sudo apt install -y live-build debootstrap syslinux syslinux-common xorriso

      - name: Limpar build anterior
        run: |
          cd ${{ github.workspace }}
          sudo lb clean --purge || true
          sudo rm -rf cache/ chroot/ binary/ .build/ .stage/ config/ || true

      - name: Copiar config/live-build → config/ (raiz)
        run: |
          cd ${{ github.workspace }}
          sudo mkdir -p config
          sudo cp -r config/live-build/config/* config/ || true
          sudo cp -r config/live-build/auto/* auto/ || true 2>/dev/null || true

      - name: Forçar tema vazio (sobrescreve tudo)
        run: |
          mkdir -p config/binary
          echo 'LB_SYSLINUX_THEME=""' > config/binary/local
          echo 'LB_BOOTLOADER="syslinux"' >> config/binary/local

      - name: Rodar lb config (na raiz)
        run: |
          cd ${{ github.workspace }}
          sudo lb config \
            --mode ubuntu \
            --distribution noble \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --bootappend-live "boot=live components username=speedos quiet splash" \
            --archive-areas "main restricted universe multiverse" \
            --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
            --mirror-chroot http://archive.ubuntu.com/ubuntu/ \
            --mirror-chroot-security http://security.ubuntu.com/ubuntu/ \
            --bootloader syslinux \
            --iso-volume "SpeedOS $(date +%Y%m%d)" \
            --iso-application "SpeedOS Live" \
            --iso-preparer "SpeedOS Team" \
            --checksums sha256 \
            --compression xz \
            --apt-indices false \
            --memtest none

      - name: Construir ISO
        run: |
          cd ${{ github.workspace }}
          sudo lb build --debug 2>&1 | tee build.log

      - name: Upload ISO + log
        uses: actions/upload-artifact@v4
        with:
          name: speedos-iso
          path: |
            *.iso
            *.sha256
            build.log