- name: Instalar live-build atualizado
        run: |
          sudo apt update
          sudo apt install -y software-properties-common
          sudo add-apt-repository universe
          sudo apt install -y live-build debootstrap

      - name: Build SpeedOS ISO
        run: |
          cd config/live-build
          echo "[SpeedOS] Limpando cache e diretórios antigos..."
          sudo lb clean --purge || true
          sudo rm -rf cache/ chroot/ binary/ local/ .build/

          echo "[SpeedOS] Forçando configuração para Ubuntu 24.04 (noble)..."
          sudo ./auto/config --mode ubuntu --distribution noble --binary-images iso-hybrid --archive-areas "main restricted universe multiverse" --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ --mirror-binary http://archive.ubuntu.com/ubuntu/

          echo "[SpeedOS] Iniciando build..."
          sudo lb build --debug

      - name: Upload da ISO gerada
        uses: actions/upload-artifact@v4
        with:
          name: speedos-iso
          path: '**/*.iso'