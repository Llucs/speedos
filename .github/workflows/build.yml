name: Build SpeedOS ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update -y
          sudo apt install -y live-build debootstrap syslinux syslinux-common xorriso squashfs-tools

      - name: Limpar build anterior
        run: |
          cd ${{ github.workspace }}
          sudo lb clean --purge || true
          sudo rm -rf cache/ chroot/ binary/ .build/ .stage/ config/ auto/ || true

      - name: Rodar lb config (na raiz)
        run: |
          cd ${{ github.workspace }}
          sudo lb config \
            --mode ubuntu \
            --distribution noble \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --bootappend-live "boot=live components username=speedos quiet splash" \
            --archive-areas "main restricted universe multiverse" \
            --mirror-bootstrap http://archive.ubuntu.com/ubuntu/ \
            --mirror-chroot http://archive.ubuntu.com/ubuntu/ \
            --mirror-chroot-security http://security.ubuntu.com/ubuntu/ \
            --bootloader syslinux \
            --syslinux-theme "" \
            --iso-volume "SpeedOS $(date +%Y%m%d)" \
            --iso-application "SpeedOS Live" \
            --iso-preparer "SpeedOS Team" \
            --checksums sha256 \
            --compression xz \
            --apt-indices false \
            --memtest none

      - name: Corrigir Configuração do Syslinux (Método Robusto)
        run: |
          cd ${{ github.workspace }}
          # 1. Substitui a linha que define o tema, forçando vazio
          sudo sed -i 's/^LB_SYSLINUX_THEME=.*/LB_SYSLINUX_THEME=""/' config/binary
          # 2. Verifica se a mudança foi aplicada (para debug)
          grep "LB_SYSLINUX_THEME" config/binary

      - name: Construir ISO
        run: |
          cd ${{ github.workspace }}
          # Passamos a variável vazia também no ambiente do sudo para garantir
          sudo LB_SYSLINUX_THEME="" lb build --debug 2>&1 | tee build.log

      - name: Upload ISO + log
        uses: actions/upload-artifact@v4
        with:
          name: speedos-iso
          path: |
            *.iso
            *.sha256
            build.log
          retention-days: 7

      - name: Falha? Mostrar log
        if: failure()
        run: |
          echo "FALHOU! Últimas 200 linhas:"
          tail -n 200 build.log