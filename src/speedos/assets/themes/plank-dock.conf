[Plank]
# Configuração para uma dock inferior elegante e leve (inspirada no macOS).
# A dock será centralizada e levemente transparente.

# Posição: 3=Bottom
Position=3

# Alinhamento: 0=Center
Alignment=0

# Tema: Usaremos o tema padrão com ajustes de transparência.
Theme=Gtk+

# Transparência: 0=Opaco, 255=Transparente
BackgroundAlpha=230

# Ocultar automaticamente
AutoHide=true

# Atraso para ocultar (em ms)
HideDelay=500

# Efeitos de ícones (zoom)
IconHover=true

# Tamanho dos ícones (em pixels)
IconSize=48
