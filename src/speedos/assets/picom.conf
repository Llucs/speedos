# SpeedOS - Picom Configuration
# Efeitos visuais leves para fluidez e modernidade (macOS, GNOME).

# Transparência/Opacidade
opacity-rule = [
  "80:class_g = 'Xfce4-panel'",  # Barra superior transparente
  "90:class_g = 'Plank'",        # Dock levemente transparente
  "100:class_g = 'GtkDialog'",  # Diálogos totalmente opacos
  "100:class_g = 'GtkFileChooserDialog'" # Seletores de arquivo totalmente opacos
];

# Sombras
shadow = true;
shadow-radius = 12;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.75;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Plank'",
  "class_g = 'Docky'",
  "class_g = 'Cairo-dock'",
  "class_g = 'Xfce4-panel'"
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-exclude = [ ];

# Outras configurações
backend = "glx";  # Usar backend GLX para melhor desempenho em hardware antigo
vsync = true;     # Sincronização vertical para evitar screen tearing
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 60;

# Arredondamento de cantos (Modernidade)
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'desktop'",
  "class_g = 'Xfce4-panel'",
  "class_g = 'Plank'"
];

# Cores (Para o tema Preto + Azul Neon)
# Embora o Picom não defina o tema GTK, podemos usar a cor de sombra para dar um toque.
# shadow-red = 0.0;
# shadow-green = 0.0;
# shadow-blue = 0.0;

# Otimização
# Evita que o Picom desenhe sombras em janelas maximizadas para economizar recursos.
wintype-option = {
  tooltip = { fade = true; shadow = false; opacity = 0.85; focus = true; full-shadow = false; };
  utility = { shadow = false; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  normal = { shadow = true; };
};

# Fim da Configuração Picom SpeedOS
